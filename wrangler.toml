name = "cadence"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 database (created via `wrangler d1 create cadence-db`)
[[d1_databases]]
binding = "DB"
database_name = "cadence-db"
database_id = "8de7a002-f28e-467d-9651-49ce3a7e93e8"

# Cron trigger — daily at 07:30 UTC (~08:30 BST) for alert dispatch
# Custom domain — bound via the Workers Custom Domains feature
[triggers]
crons = ["30 7 * * *"]
workers_dev = true

# Static assets for the SPA frontend
[assets]
directory = "./public"
binding = "ASSETS"
# SPA fallback — serve index.html for unknown routes that aren't /api/*
not_found_handling = "single-page-application"

# Environment variables (non-secret)
[vars]
ENVIRONMENT = "production"
APP_NAME = "Cadence"
# APP_URL is optional (used for alert message footer). Override per-deployment
# via `wrangler secret put APP_URL` so the production URL never lands in git.
# Default fallback in code: https://cadence.example.com

# Secrets (set via `wrangler secret put`):
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_CHAT_ID
# - AUTH_TOKEN (bearer for write endpoints)
# - EASEE_USERNAME / EASEE_PASSWORD (for live charging session sync)